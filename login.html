<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }

        .login-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .login-container h2 {
            margin-bottom: 20px;
        }

        .login-container form {
            width: 300px;
        }

        .login-container .form-control {
            margin-bottom: 15px;
        }

        .login-container .btn {
            width: 100%;
        }

        .signup-link {
            display: block;
            text-align: center;
            margin-top: 10px;
        }

        .invalid-credentials {
            display: none;
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="login-form" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">User Name :</label>
                <input type="text" class="form-control" id="username" required>
                <div class="invalid-feedback" id="username-feedback">Enter a valid username.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password :</label>
                <input type="password" class="form-control" id="password" required>
                <div class="invalid-feedback" id="password-feedback">Enter a valid password.</div>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            <div class="invalid-credentials">Enter valid username and password.</div>
        </form>
        <a href="signup.html" class="signup-link">Don't have an account? Sign up</a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function (event) {
            event.preventDefault();
            event.stopPropagation();

            let form = this;

            if (form.checkValidity() === false) {
                form.classList.add('was-validated');
            } else {
                let username = document.getElementById('username').value;
                let password = document.getElementById('password').value;
                
                let storedUsername = localStorage.getItem('username');
                let storedPassword = localStorage.getItem('password');

                if (username === storedUsername && password === storedPassword) {
                   localStorage.setItem('isLoggedIn', true);
                   console.log(localStorage.getItem('buyProductId'))
                if (localStorage.getItem('buyProductId'))
                    window.location.href='buy.html'
               else{
                      window.location.href = 'Delivery.html'; // Redirect to buy.html or another appropriate page
                  }
                } else {
                    if (username !== storedUsername) {
                        document.getElementById('username-feedback').textContent = 'Enter a valid username.';
                        document.getElementById('username').classList.add('is-invalid');
                    }
                    if (password !== storedPassword) {
                        document.getElementById('password-feedback').textContent = 'Enter a valid password.';
                        document.getElementById('password').classList.add('is-invalid');
                    }
                    document.querySelector('.invalid-credentials').style.display = 'block';
                }
            }
        });
    </script>
</body>

</html>
